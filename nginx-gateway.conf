# exe-os gateway — nginx reverse proxy
# Handles SSL termination, rate limiting, CORS, and WebSocket upgrade.
#
# Install: cp deploy/nginx-gateway.conf /etc/nginx/sites-available/gateway.askexe.com
#          ln -s /etc/nginx/sites-available/gateway.askexe.com /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx

# --- Rate limiting zones ---
# Webhook ingress: 10 req/s per IP (burst 20)
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;
# WebSocket connections: 5 conn/s per IP (burst 10)
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

# --- Upstream servers ---
upstream gateway_http {
    server 127.0.0.1:3100;
    keepalive 16;
}

upstream gateway_ws {
    server 127.0.0.1:3101;
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name gateway.askexe.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gateway.askexe.com;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/askexe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/askexe.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security headers ---
    add_header X-Frame-Options       DENY   always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # --- CORS headers (Desktop + TUI clients) ---
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost(:[0-9]+)?|askexe\.com|.*\.askexe\.com)$") {
        set $cors_origin $http_origin;
    }

    # --- Health endpoint (no rate limit) ---
    location = /health {
        proxy_pass http://gateway_http/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Webhook endpoints (rate limited) ---
    location /webhook/ {
        limit_req zone=webhook_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://gateway_http;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Webhook payloads can be large (WhatsApp media)
        client_max_body_size 10m;

        # CORS for webhook responses
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    # --- WebSocket relay (upgrade required) ---
    location /ws {
        limit_req zone=ws_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://gateway_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts — keep connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # CORS
        add_header Access-Control-Allow-Origin $cors_origin always;
    }

    # --- Default: reject unknown paths ---
    location / {
        return 404;
    }
}
